<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe | Two Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="game-container">

    <!-- Title -->
    <h1 class="title">Tic <span>Tac</span> Toe</h1>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-box score-x">
        <span class="score-label">Player X</span>
        <span class="score-value" id="scoreX">0</span>
      </div>
      <div class="score-box score-draw">
        <span class="score-label">Draws</span>
        <span class="score-value" id="scoreDraw">0</span>
      </div>
      <div class="score-box score-o">
        <span class="score-label">Player O</span>
        <span class="score-value" id="scoreO">0</span>
      </div>
    </div>

    <!-- Turn / Status Display -->
    <div class="status" id="statusText">Player X's Turn</div>

    <!-- Game Board -->
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <!-- Restart Button -->
    <button class="restart-btn" id="restartBtn">New Game</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
